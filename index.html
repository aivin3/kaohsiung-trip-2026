<title>高雄輕鬆慢遊 7 天</title>
<style>
  :root{
    --ink:#0f2742; --ink2:#3a5670; --muted:#6b7f95;
    --teal:#0ea5b7; --teal-d:#0b7c8a; --coral:#f4647d; --amber:#f59e0b; --good:#10b981; --sky:#3b82f6; --indigo:#6366f1;
    --glass:rgba(255,255,255,.72); --glass2:rgba(255,255,255,.5); --line:rgba(15,39,66,.10);
    --radius:18px; --maxw:700px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    color:var(--ink); min-height:100vh; position:relative;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Noto Sans HK","Microsoft JhengHei",sans-serif;
    line-height:1.62; font-size:16px; padding-bottom:env(safe-area-inset-bottom);
    background:linear-gradient(160deg,#9be8ff 0%,#bba6ff 22%,#ff9fde 46%,#ffc07a 70%,#86ffd2 100%);
    background-size:240% 240%; background-attachment:fixed;
    animation:dreamy 24s ease-in-out infinite;
  }
  @keyframes dreamy{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
  /* 夢幻光暈色團（更鮮） */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(40% 34% at 15% 16%, rgba(255,110,200,.68), transparent 70%),
      radial-gradient(38% 32% at 88% 12%, rgba(100,165,255,.64), transparent 70%),
      radial-gradient(44% 38% at 80% 74%, rgba(168,120,255,.6), transparent 72%),
      radial-gradient(42% 36% at 18% 86%, rgba(80,235,190,.58), transparent 72%),
      radial-gradient(32% 28% at 52% 48%, rgba(255,210,90,.5), transparent 72%);
    filter:blur(24px) saturate(1.2); animation:floaty 18s ease-in-out infinite alternate;}
  @keyframes floaty{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(0,-18px,0) scale(1.06)}}
  @media (prefers-reduced-motion:reduce){body,body::before{animation:none}}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 14px}
  a{color:var(--teal-d);text-decoration:none}
  h1,h2,h3{margin:0;line-height:1.25}
  .muted{color:var(--muted)}
  .small{font-size:13px}

  .printbar{position:sticky;top:0;z-index:50;display:flex;justify-content:flex-end;padding:9px 14px 0}
  .printbtn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    background:linear-gradient(135deg,var(--teal),var(--sky));color:#fff;border:0;
    padding:9px 15px;border-radius:13px;font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(14,165,183,.35)}
  .printbtn:active{transform:translateY(1px)}

  .cover{position:relative;border-radius:24px;overflow:hidden;padding:34px 20px 28px;margin:6px 0 4px;
    background:linear-gradient(130deg,#06b6d4 0%,#3b82f6 38%,#a855f7 64%,#f472b6 82%,#fb923c 100%);
    box-shadow:0 18px 40px rgba(59,130,246,.28)}
  .cover .hero{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:.34;mix-blend-mode:overlay}
  .cover .veil{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(8,40,80,.05),rgba(8,40,80,.34))}
  .cover .ct{position:relative;z-index:2}
  .cover .kicker{font-size:13px;font-weight:800;letter-spacing:3px;color:rgba(255,255,255,.9);text-transform:uppercase}
  .cover h1{font-size:29px;font-weight:900;color:#fff;letter-spacing:.5px;margin-top:6px;text-shadow:0 2px 12px rgba(0,0,0,.18)}
  .cover .sub{margin-top:7px;color:rgba(255,255,255,.95);font-weight:600}
  .cover .deco{margin-top:12px;font-size:21px;letter-spacing:7px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.22))}
  .cover .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .chip{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);backdrop-filter:blur(6px);
    padding:6px 12px;border-radius:999px;font-size:13px;color:#fff;font-weight:700;white-space:nowrap}

  .nav{position:sticky;top:0;z-index:30;margin:10px -14px 0}
  .nav .scroller{display:flex;gap:7px;overflow-x:auto;padding:9px 14px;scrollbar-width:none;
    background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav .scroller::-webkit-scrollbar{display:none}
  .nav button{flex:0 0 auto;background:#fff;color:var(--ink2);border:1px solid var(--line);
    border-radius:999px;padding:7px 14px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(15,39,66,.06)}
  .nav button.active{background:linear-gradient(135deg,var(--teal),var(--sky));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(14,165,183,.4)}

  section{margin:20px 0}
  .sec-title{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:900;margin:0 0 12px;
    background:linear-gradient(100deg,#7c3aed,#0ea5b7 45%,#f4647d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sec-title .i{font-size:22px;-webkit-text-fill-color:initial}

  .card{background:linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.6));backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid rgba(255,255,255,.75);border-radius:var(--radius);padding:15px;margin-bottom:13px;
    box-shadow:0 12px 30px rgba(124,93,237,.12),0 2px 8px rgba(244,100,125,.08)}

  .day-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .day-head .d{font-size:14px;font-weight:900;letter-spacing:.5px;color:#fff;
    background:linear-gradient(135deg,var(--coral),var(--amber));padding:5px 12px;border-radius:999px;box-shadow:0 4px 12px rgba(244,100,125,.32)}
  .day-theme{font-size:18px;font-weight:900;margin:4px 0 12px;color:var(--ink)}
  .wx{display:inline-flex;gap:6px;align-items:center;font-size:13px;color:var(--ink2);font-weight:700;
    background:rgba(255,255,255,.7);border:1px solid var(--line);padding:4px 10px;border-radius:999px}

  .act{display:flex;gap:12px;padding:13px 0;border-top:1px dashed var(--line)}
  .act:first-of-type{border-top:0;padding-top:4px}
  .act .time{flex:0 0 54px;font-weight:900;color:#fff;font-size:12.5px;text-align:center;
    background:linear-gradient(135deg,var(--teal),var(--sky));border-radius:10px;padding:5px 4px;height:fit-content;box-shadow:0 4px 10px rgba(14,165,183,.3)}
  .act .body{flex:1;min-width:0}
  .act .nm{font-weight:800;font-size:16.5px}
  .act .det{font-size:13.5px;color:var(--ink2);margin-top:3px}
  .act .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:12px;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.85);border:1px solid var(--line);color:var(--ink2);white-space:nowrap;font-weight:600}
  .tag.cost{background:linear-gradient(135deg,rgba(245,158,11,.16),rgba(244,100,125,.16));border-color:rgba(245,158,11,.45);color:#b45309}
  .tag.free{background:linear-gradient(135deg,rgba(16,185,129,.16),rgba(14,165,183,.16));border-color:rgba(16,185,129,.45);color:#047857}
  .act img.thumb{width:100%;border-radius:14px;margin-top:10px;display:block;border:1px solid rgba(255,255,255,.6)}
  .act-ph{margin-top:10px;height:118px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    color:#fff;font-weight:900;font-size:15.5px;text-shadow:0 2px 9px rgba(0,0,0,.32);position:relative;overflow:hidden;
    background:linear-gradient(125deg,#22d3ee 0%,#6366f1 38%,#d946ef 68%,#fb7185 88%,#fbbf24 100%);border:1px solid rgba(255,255,255,.55)}
  .act-ph::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 22% 24%,rgba(255,255,255,.5),transparent 42%),radial-gradient(circle at 80% 80%,rgba(255,255,255,.28),transparent 45%)}
  .act-ph .pe{font-size:40px;line-height:1;position:relative;filter:drop-shadow(0 3px 6px rgba(0,0,0,.25))}
  .act-ph span{position:relative;max-width:82%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .din-item img.thumb{width:100%;height:150px;object-fit:cover;border-radius:13px;margin:0 0 9px;border:1px solid rgba(255,255,255,.6);display:block}
  .mustdo{margin-top:8px;background:linear-gradient(135deg,rgba(16,185,129,.13),rgba(245,158,11,.12));
    border:1px solid rgba(16,185,129,.38);border-radius:12px;padding:8px 11px;font-size:13.5px}
  .mustdo b{color:#047857}
  .transfer{margin-top:11px;font-size:13px;color:var(--ink2);background:rgba(59,130,246,.09);
    border-left:3px solid var(--sky);border-radius:0 10px 10px 0;padding:7px 11px;font-weight:600}
  .meal{background:linear-gradient(135deg,rgba(245,158,11,.10),rgba(244,100,125,.08));border:1px solid rgba(245,158,11,.28);border-radius:14px;padding:11px 12px;margin-top:4px}
  .meal .mt{font-weight:800}

  .btn-map,.btn-link,.btn-menu{display:inline-flex;align-items:center;gap:5px;margin-top:9px;padding:7px 12px;border-radius:11px;font-size:13px;font-weight:800}
  .btn-map{background:linear-gradient(135deg,rgba(14,165,183,.14),rgba(59,130,246,.14));border:1px solid rgba(14,165,183,.4);color:var(--teal-d)}
  .btn-link{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.4);color:#4f46e5}
  .btn-menu{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.5);color:#b45309}
  .btn-map:active,.btn-link:active,.btn-menu:active{transform:translateY(1px)}

  .backup{margin-top:12px;background:rgba(59,130,246,.07);border:1px dashed rgba(59,130,246,.4);border-radius:13px;padding:10px 12px}
  .backup .bt{font-weight:800;font-size:13.5px;color:var(--sky);margin-bottom:5px}
  .backup ul{margin:0;padding-left:18px;font-size:13.5px;color:var(--ink2)}
  .backup li{margin:3px 0}

  .alt-group{margin-bottom:16px}
  .alt-group h3{font-size:16px;font-weight:900;margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .alt-item,.din-item{background:var(--glass2);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:11px 12px;margin-bottom:9px}
  .alt-item .an,.din-item .an{font-weight:800;font-size:15.5px}
  .alt-item .ad,.din-item .ad{font-size:12.5px;color:var(--muted);margin-top:2px}
  .alt-item .anote,.din-item .anote{font-size:13.5px;color:var(--ink2);margin-top:5px}
  .din-item .sig{font-size:13px;color:#b45309;margin-top:5px;font-weight:600}
  .alt-item .arow,.din-item .arow{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:6px}

  .hotel .hn{font-weight:900;font-size:17px}
  .hotel .row{display:flex;justify-content:space-between;gap:10px;margin-top:5px;font-size:14px}
  .hotel .price{color:#b45309;font-weight:900}
  .hotel img.thumb{width:100%;border-radius:14px;margin-top:10px;border:1px solid rgba(255,255,255,.6)}

  table.bud{width:100%;border-collapse:collapse;font-size:14.5px}
  table.bud td{padding:9px 4px;border-top:1px solid var(--line)}
  table.bud tr:first-child td{border-top:0}
  table.bud td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  table.bud .total td{font-weight:900;font-size:16px;border-top:2px solid var(--coral);color:#b45309}
  .tiers{display:flex;gap:9px;margin:2px 0 12px;overflow-x:auto;scrollbar-width:none}
  .tier{flex:1;min-width:118px;background:var(--glass2);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:11px;text-align:center}
  .tier .tl{font-size:13px;font-weight:800;color:var(--ink2)}
  .tier .tv{font-size:18px;font-weight:900;margin-top:3px;background:linear-gradient(135deg,var(--teal),var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tier .tp{font-size:12px;color:var(--muted);margin-top:2px}
  .tier.pick{border-color:var(--teal);box-shadow:0 6px 16px rgba(14,165,183,.2)}

  ul.tips{margin:0;padding-left:19px}
  ul.tips li{margin:7px 0}
  .ess{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .ess .e{background:var(--glass2);border:1px solid rgba(255,255,255,.6);border-radius:13px;padding:10px 12px}
  .ess .e .k{font-size:12px;color:var(--muted);font-weight:700}
  .ess .e .v{font-weight:800;font-size:14.5px;margin-top:2px}

  .reliab{font-size:12px;color:var(--muted);margin-top:9px;font-style:italic}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px 0 34px}
  .totop{position:fixed;right:14px;bottom:18px;z-index:40;width:46px;height:46px;border-radius:50%;
    background:linear-gradient(135deg,var(--teal),var(--sky));color:#fff;border:0;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(14,165,183,.4);display:none}

  @media print{
    @page{margin:11mm}
    body{background:#fff!important;font-size:12.5px;animation:none}
    body::before{display:none!important}
    .printbar,.nav,.totop{display:none!important}
    .wrap{max-width:none}
    .cover{box-shadow:none;border-radius:14px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    section,.card,.act,.hotel,.alt-item,.din-item{break-inside:avoid;page-break-inside:avoid}
    .card{box-shadow:none;background:#fff;border:1px solid #d7dee6;backdrop-filter:none}
    .sec-title{break-after:avoid}
    .day-head .d,.act .time,.tag.cost,.tag.free,.day-theme,.mustdo{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .btn-map,.btn-link,.btn-menu,.act-ph{display:none!important}
    .act img.thumb,.hotel img.thumb,.din-item img.thumb{max-height:150px;object-fit:cover}
  }
</style>
</head>

<script>
const T = JSON.parse(document.getElementById('trip-data').textContent);
const E=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const has=v=>v!==undefined&&v!==null&&v!=='';
const mapUrl=q=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);
function mapBtn(q,label){if(!has(q))return '';return `<a class="btn-map" target="_blank" rel="noopener" href="${mapUrl(q)}">📍 ${E(label||'開地圖導航')}</a>`;}
function costTag(c){if(c===0)return '<span class="tag free">免費</span>';if(has(c))return `<span class="tag cost">${E(c)}</span>`;return '';}
function wxIcon(k){const m={sunny:'☀️',cloudy:'☁️',rain:'🌧️',showers:'🌦️',snow:'❄️',storm:'⛈️',partly:'⛅',windy:'🌬️',fog:'🌫️'};return m[k]||'🌤️';}
function mustList(m){return Array.isArray(m)?m.map(E).join('；'):E(m);}

function render(){
  let h='';
  const hero=has(T.heroImage)?`<div class="hero" style="background-image:url('${E(T.heroImage)}')"></div>`:'';
  h+=`<div class="cover">${hero}<div class="veil"></div><div class="ct">
    ${has(T.kicker)?`<div class="kicker">${E(T.kicker)}</div>`:''}
    <h1>${E(T.title)}</h1>
    ${has(T.subtitle)?`<div class="sub">${E(T.subtitle)}</div>`:''}
    <div class="deco">🏖️ ✈️ 🌴 🍧 📸 🗺️ 🌈</div>
    <div class="meta">
      ${has(T.dateRange)?`<span class="chip">📅 ${E(T.dateRange)}</span>`:''}
      ${has(T.travelers)?`<span class="chip">👥 ${E(T.travelers)}</span>`:''}
      ${has(T.days)?`<span class="chip">🗓️ ${T.days.length} 天</span>`:''}
      ${has(T.budget&&T.budget.perPerson)?`<span class="chip">💰 人均 ${E(T.budget.perPerson)}</span>`:''}
    </div></div></div>`;

  if(has(T.days)&&T.days.length){
    h+='<div class="nav"><div class="scroller" id="dnav"><button data-go="top" class="active">總覽</button>';
    T.days.forEach((d,i)=>{h+=`<button data-go="day${i}">D${i+1}${has(d.date)?' · '+E(d.date):''}</button>`;});
    if(has(T.dining))h+=`<button data-go="dining">美食</button>`;
    if(has(T.alternatives))h+=`<button data-go="alts">備選</button>`;
    if(has(T.hotels))h+=`<button data-go="hotels">住宿</button>`;
    if(has(T.budget))h+=`<button data-go="budget">預算</button>`;
    if(has(T.essentials))h+=`<button data-go="ess">實用</button>`;
    h+='</div></div>';
  }

  if(has(T.highlights)&&T.highlights.length){
    h+=`<section id="top"><div class="sec-title"><span class="i">✨</span>行程亮點</div><div class="card"><ul class="tips">`;
    h+=T.highlights.map(x=>`<li>${E(x)}</li>`).join('')+'</ul></div></section>';
  }

  if(has(T.weather)){const w=T.weather;
    h+=`<section><div class="sec-title"><span class="i">🌤️</span>天氣 & 穿搭</div><div class="card">
      <div>${E(w.summary)||''}</div>
      <div class="tags" style="margin-top:9px">
        ${has(w.avgHigh)?`<span class="tag">高 ${E(w.avgHigh)}°</span>`:''}
        ${has(w.avgLow)?`<span class="tag">低 ${E(w.avgLow)}°</span>`:''}
        ${has(w.rainfall)?`<span class="tag">降雨 ${E(w.rainfall)}</span>`:''}
      </div>
      ${has(w.clothing)?`<div class="small muted" style="margin-top:9px">👕 ${E(w.clothing)}</div>`:''}
      ${has(w.tips)?`<div class="small muted" style="margin-top:4px">💡 ${E(w.tips)}</div>`:''}
    </div></section>`;
  }

  if(has(T.days))T.days.forEach((d,i)=>{
    h+=`<section id="day${i}"><div class="card">
      <div class="day-head"><span class="d">DAY ${i+1}${has(d.date)?' · '+E(d.date):''}${has(d.weekday)?' '+E(d.weekday):''}</span>
      ${has(d.weather)?`<span class="wx">${wxIcon(d.weather.icon)} ${has(d.weather.high)?E(d.weather.high)+'°':''}${has(d.weather.low)?'/'+E(d.weather.low)+'°':''}</span>`:''}</div>
      ${has(d.theme)?`<div class="day-theme">${E(d.theme)}</div>`:''}`;
    (d.activities||[]).forEach(a=>{
      if(a.meal){const m=a.meal;
        h+=`<div class="act"><div class="time">${E(a.time)||'🍽'}</div><div class="body">
          <div class="meal"><div class="mt">🍴 ${E(m.name)}</div>
          <div class="det">${[m.cuisine,has(m.perPerson)?'人均 '+E(m.perPerson):'',m.location].filter(has).map(E).join(' · ')}</div>
          ${has(m.recommended)?`<div class="small muted" style="margin-top:3px">推薦：${E(m.recommended)}</div>`:''}
          <div class="arow">${mapBtn(m.mapQuery||((m.name||'')+' '+(m.location||'')),'搵餐廳')}${has(m.menuLink)?`<a class="btn-menu" target="_blank" rel="noopener" href="${E(m.menuLink)}">📋 Menu</a>`:''}</div>
          </div>
          ${has(a.transfer)?`<div class="transfer">➡️ 去下一站：${E(a.transfer)}</div>`:''}</div></div>`;
      }else{
        const img = has(a.imageUrl)
          ? `<img class="thumb" loading="lazy" src="${E(a.imageUrl)}" alt="">`
          : `<div class="act-ph"><span class="pe">${E(a.icon||'📍')}</span><span>${E(a.name)}</span></div>`;
        h+=`<div class="act"><div class="time">${E(a.time)||'•'}</div><div class="body">
          <div class="nm">${E(a.name)}</div>
          ${has(a.note)?`<div class="det">${E(a.note)}</div>`:''}
          ${has(a.mustDo)?`<div class="mustdo"><b>✅ 必做：</b>${mustList(a.mustDo)}</div>`:''}
          <div class="tags">
            ${has(a.duration)?`<span class="tag">⏱ ${E(a.duration)}</span>`:''}
            ${costTag(a.cost)}
            ${has(a.transport)?`<span class="tag">🚇 ${E(a.transport)}</span>`:''}
          </div>
          ${img}
          ${mapBtn(a.mapQuery||a.address||a.name)}
          ${has(a.transfer)?`<div class="transfer">➡️ 去下一站：${E(a.transfer)}</div>`:''}
        </div></div>`;
      }
    });
    if(has(d.backup)&&d.backup.length){
      h+=`<div class="backup"><div class="bt">☔ 後備方案（落雨／改主意）</div><ul>`;
      h+=d.backup.map(b=>{const t=typeof b==='string'?b:`${b.name}${has(b.note)?' — '+b.note:''}`;
        const q=typeof b==='object'?(b.mapQuery||b.name):null;
        return `<li>${E(t)}${q?` <a target="_blank" rel="noopener" href="${mapUrl(q)}">📍</a>`:''}</li>`;}).join('');
      h+=`</ul></div>`;
    }
    h+=`</div></section>`;
  });

  // Dining guide
  if(has(T.dining)&&T.dining.length){
    h+=`<section id="dining"><div class="sec-title"><span class="i">🍴</span>餐廳指南（分類）</div>`;
    h+=`<div class="card"><div class="small muted">每間有介紹、招牌、營業時間（留意公休）、📍地圖、🔗介紹、📋Menu。<b>圖為該類代表食物（示意，非該店實拍）</b>，價以現場為準。</div></div>`;
    T.dining.forEach(g=>{
      h+=`<div class="alt-group"><h3>${E(g.category)}</h3>`;
      (g.items||[]).forEach(it=>{
        h+=`<div class="din-item">
          ${has(it.imageUrl)?`<img class="thumb" loading="lazy" src="${E(it.imageUrl)}" alt="">`:''}
          <div class="an">${E(it.name)}</div>
          <div class="ad">${[it.area,it.price,it.hours].filter(has).map(E).join(' · ')}</div>
          ${has(it.intro)?`<div class="anote">${E(it.intro)}</div>`:''}
          ${has(it.signature)?`<div class="sig">🍽 ${E(it.signature)}</div>`:''}
          <div class="arow">
            ${mapBtn(it.mapQuery||it.name,'地圖')}
            ${has(it.link)?`<a class="btn-link" target="_blank" rel="noopener" href="${E(it.link)}">🔗 介紹</a>`:''}
            ${has(it.menuLink)?`<a class="btn-menu" target="_blank" rel="noopener" href="${E(it.menuLink)}">📋 Menu</a>`:''}
          </div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</section>`;
  }

  // Alternatives
  if(has(T.alternatives)&&T.alternatives.length){
    h+=`<section id="alts"><div class="sec-title"><span class="i">🔁</span>備選活動庫 — 自由替換</div>`;
    h+=`<div class="card"><div class="small muted">想換／加邊個都得，話我知就改行程重出。所有 📍 都可一㩒導航。</div></div>`;
    T.alternatives.forEach(g=>{
      h+=`<div class="alt-group"><h3>${E(g.category)}</h3>`;
      (g.items||[]).forEach(it=>{
        h+=`<div class="alt-item"><div class="an">${E(it.name)}</div>
          <div class="ad">${[it.area,it.duration,it.hours].filter(has).map(E).join(' · ')}</div>
          ${has(it.note)?`<div class="anote">${E(it.note)}</div>`:''}
          <div class="arow">${costTag(it.cost)}${has(it.tag)?`<span class="tag">${E(it.tag)}</span>`:''}${mapBtn(it.mapQuery||it.name)}</div>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</section>`;
  }

  if(has(T.hotels)&&T.hotels.length){
    h+=`<section id="hotels"><div class="sec-title"><span class="i">🏨</span>住宿推薦</div>`;
    T.hotels.forEach(ht=>{
      h+=`<div class="card hotel"><div class="hn">${E(ht.name)}</div>
        <div class="row"><span class="muted">${E(ht.area)||''}${has(ht.rating)?' · ⭐'+E(ht.rating):''}</span>
        ${has(ht.pricePerNight)?`<span class="price">${E(ht.pricePerNight)}</span>`:''}</div>
        ${has(ht.checkIn)?`<div class="small muted" style="margin-top:4px">入住 ${E(ht.checkIn)}${has(ht.checkOut)?' → 退房 '+E(ht.checkOut):''}</div>`:''}
        ${has(ht.highlights)?`<div class="small" style="margin-top:6px">${E(ht.highlights)}</div>`:''}
        ${has(ht.confirmation)?`<div class="small muted" style="margin-top:4px">訂單號：${E(ht.confirmation)}</div>`:''}
        ${has(ht.imageUrl)?`<img class="thumb" loading="lazy" src="${E(ht.imageUrl)}" alt="">`:''}
        ${mapBtn(ht.mapQuery||ht.address||((ht.name||'')+' '+(ht.area||'')))}</div>`;
    });
    h+=`</section>`;
  }

  if(has(T.budget)){const b=T.budget,cats=[['transport','🚄 交通'],['accommodation','🏨 住宿'],['food','🍴 餐飲'],['tickets','🎫 門票'],['other','🛍 其他']];
    h+=`<section id="budget"><div class="sec-title"><span class="i">💰</span>預算</div>`;
    if(has(b.tiers)&&b.tiers.length){
      h+=`<div class="tiers">`+b.tiers.map(t=>`<div class="tier ${t.pick?'pick':''}"><div class="tl">${E(t.label)}</div><div class="tv">${E(t.total)}</div>${has(t.note)?`<div class="tp">${E(t.note)}</div>`:''}</div>`).join('')+`</div>`;
    }
    h+=`<div class="card"><table class="bud">`;
    cats.forEach(([k,lbl])=>{if(b[k]&&has(b[k].subtotal))h+=`<tr><td>${lbl}</td><td class="r">${E(b[k].subtotal)}</td></tr>`;});
    if(has(b.total))h+=`<tr class="total"><td>總計</td><td class="r">${E(b.total)}</td></tr>`;
    if(has(b.perPerson))h+=`<tr><td class="muted">人均</td><td class="r muted">${E(b.perPerson)}</td></tr>`;
    h+=`</table>${has(b.note)?`<div class="reliab">${E(b.note)}</div>`:''}</div></section>`;
  }

  if(has(T.essentials)){const es=T.essentials;
    const rows=[['currency','💱 貨幣 / 匯率'],['plug','🔌 插頭電壓'],['transit','🚇 交通卡'],['emergency','🚨 緊急電話'],['sim','📶 上網 / SIM'],['timezone','🕐 時區'],['language','🗣 語言'],['tipping','💵 小費']];
    h+=`<section id="ess"><div class="sec-title"><span class="i">🧭</span>實用資訊</div><div class="card"><div class="ess">`;
    rows.forEach(([k,lbl])=>{if(has(es[k]))h+=`<div class="e"><div class="k">${lbl}</div><div class="v">${E(es[k])}</div></div>`;});
    h+=`</div></div></section>`;
  }

  if(has(T.tips)&&T.tips.length){
    h+=`<section><div class="sec-title"><span class="i">📝</span>貼士 & 避坑</div><div class="card"><ul class="tips">`;
    h+=T.tips.map(x=>`<li>${E(x)}</li>`).join('')+`</ul></div></section>`;
  }

  h+=`<footer>由 AI Travel Brain · 三角色 Swarm 生成${has(T.generationDate)?' · '+E(T.generationDate):''}<br>資料整合自公開來源，出發前請核實營業時間 / 票價 / 交通 / 天氣。</footer>`;
  document.getElementById('app').innerHTML=h;
  wireNav();
}
function wireNav(){
  const nav=document.getElementById('dnav');
  if(nav){
    nav.addEventListener('click',e=>{const b=e.target.closest('button[data-go]');if(!b)return;
      const id=b.dataset.go;const el=id==='top'?document.body:document.getElementById(id);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});});
    const btns=[...nav.querySelectorAll('button')],map={};btns.forEach(b=>map[b.dataset.go]=b);
    const io=new IntersectionObserver(ents=>{ents.forEach(en=>{if(en.isIntersecting){
      btns.forEach(x=>x.classList.remove('active'));
      const m=map[en.target.id]||map['top'];if(m){m.classList.add('active');m.scrollIntoView({inline:'center',block:'nearest'});}}});},
      {rootMargin:'-45% 0px -50% 0px'});
    document.querySelectorAll('section[id]').forEach(s=>io.observe(s));
  }
  const tt=document.getElementById('totop');
  addEventListener('scroll',()=>{tt.style.display=scrollY>500?'block':'none'});
}
render();
</script>
</body>
</html>
